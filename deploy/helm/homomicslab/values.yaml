# Default values for HomomicsLab.
# This is a minimal scaffold for Kubernetes deployment.

replicaCount: 1

image:
  backend:
    repository: homomicslab/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  frontend:
    repository: homomicslab/frontend
    pullPolicy: IfNotPresent
    tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: homomics.lab
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  backend:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  frontend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 50Gi

# Environment variables injected into the backend container.
env:
  APP_ENV: production
  DATABASE_URL: sqlite:///data/homomics_lab.db
  WORKSPACE_ROOT: /data/workspaces
  DATA_DIR: /data
  HOMOMICS_AUTH_ENABLED: "false"
  HOMOMICS_AUDIT_LOG_ENABLED: "true"
  HOMOMICS_RATE_LIMIT_ENABLED: "true"

# Secrets that should be created outside of Helm (e.g. via kubectl create secret).
secrets:
  # name of an existing secret containing OPENAI_API_KEY, etc.
  existingSecret: ""

nodeSelector: {}
tolerations: []
affinity: {}

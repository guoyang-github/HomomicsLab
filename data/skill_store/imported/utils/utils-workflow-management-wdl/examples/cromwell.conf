# Cromwell Backend Configuration
# Supports Local and SLURM backends

include required(classpath("application"))

backend {
    default = "Local"

    providers {
        Local {
            actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
            config {
                concurrent-job-limit = 10
                runtime-attributes = """
                    Int cpu = 1
                    Int memory_mb = 2000
                    String? docker
                """
                submit-docker = "docker run --rm -v ${cwd}:${docker_cwd} ${docker} ${job_shell} ${docker_script}"
            }
        }

        SLURM {
            actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
            config {
                runtime-attributes = """
                    Int cpu = 1
                    Int memory_mb = 4000
                    Int runtime_minutes = 60
                    String partition = "normal"
                    String? docker
                    String? singularity
                """

                submit = """
                    sbatch \
                        --partition=${partition} \
                        --cpus-per-task=${cpu} \
                        --mem=${memory_mb}M \
                        --time=${runtime_minutes} \
                        --output=${cwd}/execution/stdout \
                        --error=${cwd}/execution/stderr \
                        --chdir=${cwd} \
                        ${"--wrap=\"" + job_shell + ' ' + script + "\""}
                """

                kill = "scancel ${job_id}"
                check-alive = "squeue -j ${job_id}"
                job-id-regex = "Submitted batch job (\\d+)"
            }
        }
    }
}

call-caching {
    enabled = true
    invalidate-bad-cache-results = true
}

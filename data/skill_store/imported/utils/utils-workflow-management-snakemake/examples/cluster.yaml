# Snakemake 7.x SLURM Resource Configuration
# Usage: snakemake --cluster "sbatch --partition={cluster.partition}
#   --time={cluster.time} --mem={cluster.mem}
#   --cpus-per-task={cluster.cpus-per-task}"
#   --cluster-config cluster.yaml --jobs 100

__default__:
  partition: normal
  time: "1:00:00"
  mem: 4G
  cpus-per-task: 2

fastp:
  partition: normal
  time: "1:00:00"
  mem: 8G
  cpus-per-task: 4

salmon_quant:
  partition: normal
  time: "4:00:00"
  mem: 32G
  cpus-per-task: 8

multiqc:
  partition: normal
  time: "1:00:00"
  mem: 4G
  cpus-per-task: 2

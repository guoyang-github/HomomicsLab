# HomomicsLab Alembic configuration
# Run migrations with: cd backend && alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Use the same async database URL as the application.
sqlalchemy.url = %(HOMOMICS_DATABASE_URL)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

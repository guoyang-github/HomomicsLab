# Snakemake 8.x+ SLURM Profile
# Usage: snakemake --workflow-profile profiles/slurm --use-conda

executor: slurm
jobs: 100

# Default resources
resources:
  mem_mb: 4000
  runtime: 60

default-resources:
  mem_mb: 4000
  runtime: 60
  slurm_partition: normal

# Rule-specific resources
set-resources:
  fastp:
    mem_mb: 8000
    runtime: 60
    slurm_partition: normal
    cpus_per_task: 4
  salmon_quant:
    mem_mb: 32000
    runtime: 240
    slurm_partition: normal
    cpus_per_task: 8
  multiqc:
    mem_mb: 4000
    runtime: 30
    slurm_partition: normal
    cpus_per_task: 2

# Command modifiers
set-threads:
  fastp: 4
  salmon_quant: 8
  multiqc: 2

# Restart behavior
restart-times: 1
rerun-incomplete: true
keep-going: true
latency-wait: 60

# Conda
use-conda: true
conda-prefix: /scratch/$USER/conda-envs

# Singularity (uncomment if needed)
# use-singularity: true
# singularity-prefix: /scratch/$USER/singularity-images

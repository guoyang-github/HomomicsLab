domain: mrnaseq
display_name: Bulk mRNA-seq
description: Best-practice bulk mRNA-seq analysis covering reads QC, alignment/quantification, count preparation, exploratory QC, batch correction, differential expression, pathway enrichment, WGCNA, splicing, time-series, PPI, deconvolution, and reporting. Phases form a DAG; orchestrator skills provide end-to-end shortcuts.
version: "3.0.0"

orchestrator_skills: []

phases:
  - id: reads_qc
    required: true
    description: Raw and processed reads quality control
    skills: [bio-mrna-seq-qc-preprocessing, bio-mrna-seq-qc-bam]
    default_skill: bio-mrna-seq-qc-preprocessing

  - id: alignment
    required: true
    description: Splice-aware alignment of bulk mRNA-seq reads
    skills: [bio-mrna-seq-alignment]
    default_skill: bio-mrna-seq-alignment

  - id: quantification
    required: true
    description: Transcript-level or gene-level quantification
    skills: [bio-mrna-seq-quantification]
    default_skill: bio-mrna-seq-quantification

  - id: count_prep
    required: true
    description: Count matrix preparation and normalization
    skills: [bio-mrna-seq-count-prep]
    default_skill: bio-mrna-seq-count-prep

  - id: exploratory_qc
    required: true
    description: Exploratory data analysis and sample-level QC
    skills: [bio-mrna-seq-qc-exploratory]
    default_skill: bio-mrna-seq-qc-exploratory

  - id: batch_correction
    required: false
    description: Batch effect correction and covariate adjustment
    skills: [bio-mrna-seq-batch-correction]
    default_skill: bio-mrna-seq-batch-correction

  - id: differential_expression
    required: false
    description: Differential gene expression analysis
    skills: [bio-mrna-seq-differential-expression]
    default_skill: bio-mrna-seq-differential-expression

  - id: pathway_enrichment
    required: false
    description: Pathway and functional enrichment analysis
    skills: [bio-mrna-seq-pathway-enrichment]
    default_skill: bio-mrna-seq-pathway-enrichment

  - id: ppi
    required: false
    description: Protein-protein interaction network analysis
    skills: [bio-mrna-seq-ppi]
    default_skill: bio-mrna-seq-ppi

  - id: wgcna
    required: false
    description: Weighted gene co-expression network analysis
    skills: [bio-mrna-seq-wgcna]
    default_skill: bio-mrna-seq-wgcna

  - id: splicing
    required: false
    description: Alternative splicing analysis
    skills: [bio-mrna-seq-splicing]
    default_skill: bio-mrna-seq-splicing

  - id: timeseries
    required: false
    description: Time-series expression analysis
    skills: [bio-mrna-seq-timeseries]
    default_skill: bio-mrna-seq-timeseries

  - id: deconvolution
    required: false
    description: Cell-type deconvolution and cell fraction estimation
    skills: [bio-mrna-seq-deconvolution]
    default_skill: bio-mrna-seq-deconvolution

phase_transitions:
  - from: reads_qc
    to: alignment
  - from: alignment
    to: quantification
  - from: quantification
    to: count_prep
  - from: count_prep
    to: exploratory_qc
  - from: exploratory_qc
    to: batch_correction
    type: depends_on
  - from: exploratory_qc
    to: differential_expression
  - from: batch_correction
    to: differential_expression
  - from: differential_expression
    to: pathway_enrichment
  - from: pathway_enrichment
    to: ppi
    type: alternative_to
  - from: differential_expression
    to: wgcna
    type: alternative_to
  - from: differential_expression
    to: splicing
    type: alternative_to
  - from: differential_expression
    to: timeseries
    type: alternative_to
  - from: differential_expression
    to: deconvolution
    type: alternative_to

state_checks:
  - condition: "batch_detected"
    action: insert
    target: batch_correction
    after: exploratory_qc

  - condition: "time_series_design"
    action: insert
    target: timeseries
    after: differential_expression

intents:
  - analysis_type: mrnaseq_analysis
    keywords:
      - mrnaseq
      - bulk RNA-seq
      - transcriptome
      - mRNA-seq
      - differential expression
      - DESeq2
      - edgeR
      - limma

roles:
  - role_id: mrnaseq_specialist
    name: Bulk mRNA-seq Specialist
    allowed_skills:
      - bio-mrna-seq-alignment
      - bio-mrna-seq-batch-correction
      - bio-mrna-seq-count-prep
      - bio-mrna-seq-deconvolution
      - bio-mrna-seq-differential-expression
      - bio-mrna-seq-pathway-enrichment
      - bio-mrna-seq-pipeline
      - bio-mrna-seq-ppi
      - bio-mrna-seq-qc-bam
      - bio-mrna-seq-qc-exploratory
      - bio-mrna-seq-qc-preprocessing
      - bio-mrna-seq-quantification
      - bio-mrna-seq-splicing
      - bio-mrna-seq-timeseries
      - bio-mrna-seq-wgcna
    allowed_tools: [file_read, file_write, shell_exec]
    permissions:
      can_execute: true
      can_spawn_specialist: false
      max_concurrent_tasks: 3

dag_seeds:
  - from: bio-mrna-seq-qc-preprocessing
    to: bio-mrna-seq-alignment
    type: followed_by
    context: "Align after reads QC"

  - from: bio-mrna-seq-alignment
    to: bio-mrna-seq-quantification
    type: followed_by
    context: "Quantify after alignment"

  - from: bio-mrna-seq-quantification
    to: bio-mrna-seq-count-prep
    type: followed_by
    context: "Prepare count matrix after quantification"

  - from: bio-mrna-seq-count-prep
    to: bio-mrna-seq-qc-exploratory
    type: followed_by
    context: "EDA after count preparation"

  - from: bio-mrna-seq-qc-exploratory
    to: bio-mrna-seq-differential-expression
    type: followed_by
    context: "DE after QC"

  - from: bio-mrna-seq-differential-expression
    to: bio-mrna-seq-pathway-enrichment
    type: followed_by
    context: "Enrichment after DE"

sops:
  - id: sop_mrnaseq_v3
    title: Bulk mRNA-seq Analysis SOP
    steps:
      - "Raw reads QC and preprocessing"
      - "Splice-aware alignment"
      - "Gene/transcript quantification"
      - "Count matrix preparation"
      - "Exploratory QC and batch correction"
      - "Differential expression analysis"
      - "Pathway enrichment and network analysis"
      - "Optional: WGCNA, splicing, time-series, deconvolution"
      - "Reporting"

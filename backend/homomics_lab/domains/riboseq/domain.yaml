domain: riboseq
display_name: Ribo-seq
description: Best-practice ribosome profiling (Ribo-seq) analysis covering reference indexing, reads preprocessing, alignment, quality control, ribosome periodicity, ORF detection, quantification, differential occupancy, translation efficiency, stalling detection, and reporting. Phases form a DAG; orchestrator skills provide end-to-end shortcuts.
version: "3.0.0"

orchestrator_skills: []

phases:
  - id: index_building
    required: true
    description: Build reference indexes for Ribo-seq analysis
    skills: [bio-ribo-seq-index-building]
    default_skill: bio-ribo-seq-index-building

  - id: reads_preprocessing
    required: true
    description: Preprocess raw Ribo-seq and matched RNA-seq reads
    skills: [bio-ribo-seq-riboseq-preprocessing, bio-ribo-seq-rna-preprocessing]
    default_skill: bio-ribo-seq-riboseq-preprocessing

  - id: alignment
    required: true
    description: Align Ribo-seq reads to transcriptome/genome
    skills: [bio-ribo-seq-riboseq-preprocessing]
    default_skill: bio-ribo-seq-riboseq-preprocessing

  - id: qc_reporting
    required: true
    description: Generate Ribo-seq QC and summary reports
    skills: [bio-ribo-seq-qc-reporting]
    default_skill: bio-ribo-seq-qc-reporting

  - id: metagene_visualization
    required: false
    description: Metagene analysis and read distribution visualization
    skills: [bio-ribo-seq-metagene-visualization]
    default_skill: bio-ribo-seq-metagene-visualization

  - id: ribosome_periodicity
    required: false
    description: Assess ribosome periodicity and P-site offset
    skills: [bio-ribo-seq-ribosome-periodicity]
    default_skill: bio-ribo-seq-ribosome-periodicity

  - id: orf_detection
    required: false
    description: Detect translated open reading frames
    skills: [bio-ribo-seq-orf-detection]
    default_skill: bio-ribo-seq-orf-detection

  - id: orf_quantification
    required: true
    description: Quantify ORF-level ribosome occupancy
    skills: [bio-ribo-seq-orf-quantification]
    default_skill: bio-ribo-seq-orf-quantification

  - id: differential_occupancy
    required: false
    description: Detect differential ribosome occupancy
    skills: [bio-ribo-seq-differential-occupancy]
    default_skill: bio-ribo-seq-differential-occupancy

  - id: translation_efficiency
    required: false
    description: Estimate translation efficiency between conditions
    skills: [bio-ribo-seq-translation-efficiency]
    default_skill: bio-ribo-seq-translation-efficiency

  - id: ribosome_stalling
    required: false
    description: Detect ribosome pausing and stalling sites
    skills: [bio-ribo-seq-ribosome-stalling]
    default_skill: bio-ribo-seq-ribosome-stalling

  - id: species_templates
    required: false
    description: Species-specific Ribo-seq analysis templates
    skills: [bio-ribo-seq-species-templates]
    default_skill: bio-ribo-seq-species-templates

phase_transitions:
  - from: index_building
    to: reads_preprocessing
  - from: reads_preprocessing
    to: alignment
  - from: alignment
    to: qc_reporting
  - from: qc_reporting
    to: metagene_visualization
    type: alternative_to
  - from: qc_reporting
    to: ribosome_periodicity
  - from: ribosome_periodicity
    to: orf_detection
  - from: orf_detection
    to: orf_quantification
  - from: orf_quantification
    to: differential_occupancy
  - from: differential_occupancy
    to: translation_efficiency
    type: depends_on
  - from: differential_occupancy
    to: ribosome_stalling
    type: alternative_to
  - from: orf_quantification
    to: species_templates
    type: alternative_to

state_checks:
  - condition: "matched_rna_seq"
    action: insert
    target: translation_efficiency
    after: differential_occupancy

  - condition: "has_replicates"
    action: insert
    target: differential_occupancy
    after: orf_quantification

intents:
  - analysis_type: riboseq_analysis
    keywords:
      - Ribo-seq
      - ribosome profiling
      - riboseq
      - translation
      - ORF
      - ribosome occupancy
      - RPF

roles:
  - role_id: riboseq_specialist
    name: Ribo-seq Specialist
    allowed_skills:
      - bio-ribo-seq-differential-occupancy
      - bio-ribo-seq-index-building
      - bio-ribo-seq-metagene-visualization
      - bio-ribo-seq-orf-detection
      - bio-ribo-seq-orf-quantification
      - bio-ribo-seq-qc-reporting
      - bio-ribo-seq-riboseq-preprocessing
      - bio-ribo-seq-ribosome-periodicity
      - bio-ribo-seq-ribosome-stalling
      - bio-ribo-seq-rna-preprocessing
      - bio-ribo-seq-species-templates
      - bio-ribo-seq-translation-efficiency
      - bio-ribo-seq-workflow
    allowed_tools: [file_read, file_write, shell_exec]
    permissions:
      can_execute: true
      can_spawn_specialist: false
      max_concurrent_tasks: 3

dag_seeds:
  - from: bio-ribo-seq-index-building
    to: bio-ribo-seq-riboseq-preprocessing
    type: followed_by
    context: "Preprocess after index building"

  - from: bio-ribo-seq-riboseq-preprocessing
    to: bio-ribo-seq-qc-reporting
    type: followed_by
    context: "QC after preprocessing"

  - from: bio-ribo-seq-qc-reporting
    to: bio-ribo-seq-ribosome-periodicity
    type: followed_by
    context: "Periodicity after QC"

  - from: bio-ribo-seq-ribosome-periodicity
    to: bio-ribo-seq-orf-detection
    type: followed_by
    context: "ORF detection after periodicity assessment"

  - from: bio-ribo-seq-orf-detection
    to: bio-ribo-seq-orf-quantification
    type: followed_by
    context: "Quantify detected ORFs"

  - from: bio-ribo-seq-orf-quantification
    to: bio-ribo-seq-differential-occupancy
    type: followed_by
    context: "Differential occupancy after quantification"

  - from: bio-ribo-seq-differential-occupancy
    to: bio-ribo-seq-translation-efficiency
    type: followed_by
    context: "Translation efficiency after occupancy"

sops:
  - id: sop_riboseq_v3
    title: Ribo-seq Analysis SOP
    steps:
      - "Build reference indexes"
      - "Preprocess Ribo-seq and RNA-seq reads"
      - "Align reads and generate BAM"
      - "QC reporting and metagene visualization"
      - "Ribosome periodicity and P-site estimation"
      - "ORF detection and quantification"
      - "Differential occupancy and translation efficiency"
      - "Optional: stalling detection and species templates"
      - "Reporting"

domain: viz_biomedical
display_name: Biomedical Visualization
version: "1.0.0"
description: Publication-grade statistical figures for biomedical research.

phases:
  - id: data_import
    required: true
    default_skill: bio-statistics-visualization
  - id: statistical_test
    required: false
    default_skill: bio-statistics-visualization
  - id: figure_render
    required: true
    default_skill: bio-statistics-visualization
  - id: figure_edit
    required: false
    default_skill: bio-statistics-visualization
  - id: export
    required: false
    default_skill: bio-statistics-visualization

phase_transitions:
  - from: data_import
    to: statistical_test
    type: followed_by
  - from: statistical_test
    to: figure_render
    type: followed_by
  - from: figure_render
    to: figure_edit
    type: followed_by
  - from: figure_edit
    to: figure_render
    type: followed_by
  - from: figure_render
    to: export
    type: followed_by

intents:
  - analysis_type: biomedical_plotting
    keywords:
      - "作图"
      - "画图"
      - "Prism"
      - "箱线图"
      - "小提琴图"
      - "柱状图"
      - "ANOVA"
      - "t-test"
      - "生存曲线"
      - "统计图"
      - "发表图"
    examples:
      - "帮我画一张三组小鼠肿瘤体积的箱线图"
      - "用 Nature 风格展示对照组和药物组的差异"
      - "做 Kaplan-Meier 生存曲线"

roles:
  - role_id: viz_specialist
    name: Visualization Specialist
    allowed_skills: [bio-statistics-visualization]
    allowed_tools: [file_read, file_write, shell_exec]
    permissions:
      can_execute: true
      can_spawn_specialist: false
      max_concurrent_tasks: 3

sops:
  - id: figure_export_sop
    title: 发表级图表导出 SOP
    steps:
      - 确认目标期刊主题（Nature/Cell/Science）
      - 检查坐标轴标签、单位、字体/字号
      - 导出 SVG + PNG/TIFF（300 dpi）
      - 生成可复现 Jupyter Notebook

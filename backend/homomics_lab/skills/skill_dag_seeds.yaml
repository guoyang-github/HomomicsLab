# SkillDAG manual seed edges (bootstrap)
# These edges are loaded as CONFIRMED (confidence=1.0) to provide the initial
# structural skeleton for the graph. The rest of the edges are learned at runtime.

version: "0.4.0"
description: "Default skill relationship seeds using external NanoResearch skills"

seeds:
  # === Single-cell standard flow ===
  - from: bio-single-cell-preprocessing
    to: bio-single-cell-clustering
    type: followed_by
    context: "Standard single-cell pipeline: QC/normalization → clustering"

  - from: bio-single-cell-clustering
    to: bio-single-cell-annotation-markers
    type: followed_by
    context: "Standard single-cell pipeline: clustering → cell type annotation"

  # === Hard dependencies ===
  - from: bio-single-cell-clustering
    to: bio-single-cell-preprocessing
    type: depends_on
    context: "Clustering requires QC-filtered and normalized data"

  # === Conflicts ===
  - from: bio-single-cell-clustering
    to: bio-single-cell-doublet-scrublet
    type: conflicts_with
    context: "Clustering and doublet detection can be run independently"

  # === Spatial transcriptomics ===
  - from: bio-spatial-transcriptomics-preprocessing
    to: bio-spatial-transcriptomics-clustering
    type: followed_by
    context: "Spatial preprocessing → spatial clustering"

  - from: bio-spatial-transcriptomics-clustering
    to: bio-spatial-transcriptomics-deconvolution
    type: followed_by
    context: "Spatial clustering → deconvolution"

  # === Cross-domain connections ===
  - from: bio-single-cell-annotation-markers
    to: bio-spatial-transcriptomics-deconvolution
    type: followed_by
    context: "Single-cell annotations can guide spatial deconvolution"

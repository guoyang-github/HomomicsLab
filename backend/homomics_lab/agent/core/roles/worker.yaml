role_id: worker
name: Worker
agent_type: worker
description: |
  General-purpose execution worker. Runs assigned skills and returns
  structured WorkerResult outcomes to the Supervisor.
allowed_skills:
  - "*"
permissions:
  can_execute: true
  can_review: false
  can_delegate: false
  can_spawn_specialist: false
  can_access_workspace: true
  can_call_shell: false
  max_concurrent_tasks: 1
priority: 1000
tags:
  - system
metadata:
  system: true

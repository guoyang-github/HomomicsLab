role_id: supervisor
name: Supervisor
agent_type: supervisor
prompt_template: role.supervisor
system_prompt: |
  You are the Supervisor agent. You plan, delegate, review outcomes, and decide
  whether to retry, replan, or escalate to a human.
description: |
  Top-level supervisor agent. Plans, delegates tasks to workers, reviews
  outcomes, and triggers replanning or human escalation when needed.
allowed_skills: []
permissions:
  can_execute: false
  can_review: true
  can_delegate: true
  can_spawn_specialist: true
  can_access_workspace: true
  can_call_shell: false
  max_concurrent_tasks: 1
priority: 5
tags:
  - system
metadata:
  system: true

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homomics
      POSTGRES_PASSWORD: homomics
      POSTGRES_DB: homomics_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homomics -d homomics_lab"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: homomics
      MINIO_ROOT_PASSWORD: homomicslab
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    command:
      - gunicorn
      - homomics_lab.main:app
      - -c
      - /app/gunicorn.conf.py
    environment:
      - HOMOMICS_DEBUG=false
      - HOMOMICS_EXTERNAL_SKILLS_DIRS=/app/external_skills
      - HOMOMICS_DATABASE_URL=postgresql+asyncpg://homomics:homomics@postgres:5432/homics_lab
      - HOMOMICS_SESSION_STORE_URL=postgresql+asyncpg://homomics:homomics@postgres:5432/homics_lab
      - HOMOMICS_QUEUE_BACKEND=redis
      - HOMOMICS_REDIS_URL=redis://redis:6379/0
      - HOMOMICS_STORAGE_BACKEND=s3
      - HOMOMICS_STORAGE_S3_ENDPOINT_URL=http://minio:9000
      - HOMOMICS_STORAGE_S3_BUCKET=homomics
      - HOMOMICS_STORAGE_S3_ACCESS_KEY=homomics
      - HOMOMICS_STORAGE_S3_SECRET_KEY=homomicslab
      - HOMOMICS_STORAGE_S3_PUBLIC_URL_PREFIX=http://localhost:9000/homics
      - HOMOMICS_WORKER_MODE=false
      - HOMOMICS_SKILL_SANDBOX_BACKEND=container
      - HOMOMICS_SKILL_CONTAINER_IMAGE=python:3.12-slim
    volumes:
      - ./data:/app/data
      - ./external_skills:/app/external_skills:ro
      - ./skills:/app/skills
      # Mount the host Docker socket so the backend can launch sibling sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    # Run as the non-root ``homomics`` user from the image.  Access to the host
    # Docker socket is granted by adding the host's docker group (set DOCKER_GID
    # in a .env file, e.g. DOCKER_GID=$(getent group docker | cut -d: -f3)).
    group_add:
      - "${DOCKER_GID:-999}"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health/live')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["homomics-worker"]
    environment:
      - HOMOMICS_DEBUG=false
      - HOMOMICS_EXTERNAL_SKILLS_DIRS=/app/external_skills
      - HOMOMICS_DATABASE_URL=postgresql+asyncpg://homomics:homomics@postgres:5432/homics_lab
      - HOMOMICS_SESSION_STORE_URL=postgresql+asyncpg://homomics:homomics@postgres:5432/homics_lab
      - HOMOMICS_QUEUE_BACKEND=redis
      - HOMOMICS_REDIS_URL=redis://redis:6379/0
      - HOMOMICS_STORAGE_BACKEND=s3
      - HOMOMICS_STORAGE_S3_ENDPOINT_URL=http://minio:9000
      - HOMOMICS_STORAGE_S3_BUCKET=homomics
      - HOMOMICS_STORAGE_S3_ACCESS_KEY=homomics
      - HOMOMICS_STORAGE_S3_SECRET_KEY=homomicslab
      - HOMOMICS_SKILL_SANDBOX_BACKEND=container
      - HOMOMICS_SKILL_CONTAINER_IMAGE=python:3.12-slim
    volumes:
      - ./data:/app/data
      - ./external_skills:/app/external_skills:ro
      - ./skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q homomics-worker"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

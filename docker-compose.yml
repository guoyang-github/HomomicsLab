version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOMICS_DEBUG=false
      - HOMICS_EXTERNAL_SKILLS_DIR=/app/external_skills
    volumes:
      - ./data:/app/data
      - ./external_skills:/app/external_skills:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

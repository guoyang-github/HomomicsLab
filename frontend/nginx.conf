server {
    listen 80;
    server_name ${NGINX_SERVER_NAME:-localhost};
    root /usr/share/nginx/html;
    index index.html;

    # Large file uploads for bioinformatics data (1 GB default).
    client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE:-1G};
    client_body_timeout 300s;
    client_header_timeout 60s;

    # Security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        proxy_pass http://${NGINX_BACKEND_HOST:-backend}:${NGINX_BACKEND_PORT:-8080};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

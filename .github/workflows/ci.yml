name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Run tests with coverage
        run: pytest backend/tests/ -q --tb=short --cov=backend/homomics_lab --cov-report=term-missing --cov-fail-under=70

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Run ruff
        run: ruff check backend/homomics_lab backend/tests
      - name: Run mypy
        continue-on-error: true
        run: mypy backend/homomics_lab

  backend-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t homomics-lab-backend .
      - name: Smoke test backend container
        run: |
          docker run -d --name homomics-backend -p 8080:8080 homomics-lab-backend
          sleep 10
          curl -f http://localhost:8080/health || (docker logs homomics-backend && exit 1)
          docker stop homomics-backend

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --run
      - name: Build
        run: npm run build
